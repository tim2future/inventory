<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>庫存管理系統</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
:root {
  --bg: #ffffff;
  --bg2: #f5f5f5;
  --bg3: #ebebeb;
  --txt: #111111;
  --txt2: #666666;
  --txt3: #999999;
  --border: rgba(0,0,0,0.1);
  --border2: rgba(0,0,0,0.2);
  --danger: #e24b4a;
  --danger-bg: #fff0f0;
  --info: #378add;
  --info-bg: #e6f1fb;
  --success: #639922;
  --r-md: 8px;
  --r-lg: 12px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1a1a1a;
    --bg2: #242424;
    --bg3: #2e2e2e;
    --txt: #f0f0f0;
    --txt2: #aaaaaa;
    --txt3: #666666;
    --border: rgba(255,255,255,0.1);
    --border2: rgba(255,255,255,0.2);
    --danger-bg: #2d1414;
    --info-bg: #0d1f33;
  }
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, 'PingFang TC', sans-serif; background: var(--bg); color: var(--txt); font-size: 15px; }

/* ── Layout ── */
#app { max-width: 480px; margin: 0 auto; padding: 12px 12px 80px; }
.topbar { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
.topbar h1 { flex: 1; font-size: 18px; font-weight: 600; }
.sync-status { font-size: 11px; color: var(--txt3); display: flex; align-items: center; gap: 4px; }
.sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); }
.sync-dot.syncing { background: var(--info); animation: pulse 1s infinite; }
.sync-dot.error { background: var(--danger); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* ── Setup Banner ── */
#setup-banner { background: var(--info-bg); border: 0.5px solid var(--info); border-radius: var(--r-lg); padding: 12px 14px; margin-bottom: 12px; }
#setup-banner h3 { font-size: 14px; font-weight: 600; color: var(--info); margin-bottom: 6px; }
#setup-banner p { font-size: 12px; color: var(--txt2); line-height: 1.6; margin-bottom: 8px; }
#setup-banner input { width: 100%; padding: 8px 10px; border: 0.5px solid var(--border2); border-radius: var(--r-md); font-size: 13px; background: var(--bg); color: var(--txt); margin-bottom: 6px; }
#setup-banner button { width: 100%; height: 36px; background: var(--info); color: #fff; border: none; border-radius: var(--r-md); font-size: 13px; font-weight: 500; cursor: pointer; }

/* ── Stats ── */
.stats-row { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 8px; margin-bottom: 12px; }
.stat { background: var(--bg2); border-radius: var(--r-md); padding: 10px 12px; }
.stat-label { font-size: 11px; color: var(--txt3); margin-bottom: 2px; }
.stat-val { font-size: 20px; font-weight: 600; }
.stat-val.warn { color: var(--danger); }

/* ── Search & Filter ── */
.search-wrap { position: relative; margin-bottom: 8px; }
.search-wrap i { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 16px; color: var(--txt3); pointer-events: none; }
.search-wrap input { width: 100%; padding: 0 12px 0 34px; height: 40px; border: 0.5px solid var(--border2); border-radius: var(--r-md); font-size: 14px; background: var(--bg); color: var(--txt); }
.tabs { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 8px; }
.tab { padding: 5px 10px; border-radius: var(--r-md); border: 0.5px solid var(--border2); background: var(--bg); color: var(--txt2); font-size: 12px; cursor: pointer; white-space: nowrap; transition: all 0.15s; }
.tab.active { background: var(--txt); color: var(--bg); border-color: var(--txt); }
.filter-row { display: flex; gap: 8px; margin-bottom: 12px; align-items: center; }
.filter-row select { flex: 1; height: 34px; border: 0.5px solid var(--border2); border-radius: var(--r-md); font-size: 12px; background: var(--bg); color: var(--txt); padding: 0 8px; }
.badge-low { font-size: 11px; padding: 5px 10px; border-radius: var(--r-md); background: var(--danger-bg); color: var(--danger); cursor: pointer; white-space: nowrap; border: 0.5px solid transparent; }
.badge-low.on { border-color: var(--danger); font-weight: 600; }

/* ── Product Grid ── */
.grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 10px; }
.pcard { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--r-lg); overflow: hidden; cursor: pointer; transition: border-color 0.15s; user-select: none; }
.pcard:hover { border-color: var(--border2); }
.pcard.low-warn { border-left: 3px solid var(--danger); }
.pcard.zero-warn { opacity: 0.5; }
.pcard.dragging { opacity: 0.35; transform: scale(0.97); }
.pcard.drag-over { border: 2px solid var(--info); }
.pimg { width: 100%; aspect-ratio: 1; background: var(--bg2); display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
.pimg img { width: 100%; height: 100%; object-fit: cover; }
.pimg .no-img { font-size: 32px; color: var(--txt3); }
.pimg .img-count { position: absolute; bottom: 5px; right: 5px; background: rgba(0,0,0,0.5); color: #fff; font-size: 10px; padding: 2px 5px; border-radius: 4px; }
.pinfo { padding: 8px 10px; }
.pname { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
.pmeta { font-size: 10px; color: var(--txt3); margin-bottom: 6px; font-family: monospace; }
.pstock-row { display: flex; align-items: center; justify-content: space-between; }
.pstock { font-size: 18px; font-weight: 600; }
.pstock.warn { color: var(--danger); }
.pstock.zero { color: var(--txt3); }
.stock-btns { display: flex; gap: 4px; }
.sbtn { width: 28px; height: 28px; border: 0.5px solid var(--border2); border-radius: 6px; background: var(--bg2); color: var(--txt); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.1s; }
.sbtn:active { transform: scale(0.9); }
.add-card { border: 0.5px dashed var(--border2); border-radius: var(--r-lg); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; cursor: pointer; color: var(--txt3); font-size: 12px; min-height: 140px; background: transparent; }
.add-card:hover { background: var(--bg2); }
.empty { grid-column: 1/-1; text-align: center; padding: 2rem; color: var(--txt3); font-size: 13px; }

/* ── FAB ── */
.fab { position: fixed; bottom: 20px; right: 20px; width: 52px; height: 52px; background: var(--txt); color: var(--bg); border: none; border-radius: 50%; font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 100; box-shadow: 0 2px 12px rgba(0,0,0,0.2); }

/* ── Modal Overlay ── */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; overflow-y: auto; padding: 20px 12px; }
.overlay.open { display: block; }
.modal { background: var(--bg); border-radius: var(--r-lg); padding: 16px; max-width: 460px; margin: 0 auto; }
.modal-head { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
.modal-head h2 { flex: 1; font-size: 16px; font-weight: 600; }
.icon-btn { width: 34px; height: 34px; border-radius: var(--r-md); border: 0.5px solid var(--border2); background: var(--bg); color: var(--txt); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.icon-btn.danger { border-color: var(--danger); color: var(--danger); background: var(--danger-bg); }

/* ── Image Gallery in Modal ── */
.img-gallery { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 8px; margin-bottom: 14px; -webkit-overflow-scrolling: touch; }
.img-thumb { width: 80px; height: 80px; border-radius: var(--r-md); overflow: hidden; flex-shrink: 0; border: 0.5px solid var(--border); position: relative; }
.img-thumb img { width: 100%; height: 100%; object-fit: cover; }
.img-thumb .del-img { position: absolute; top: 3px; right: 3px; width: 20px; height: 20px; background: rgba(0,0,0,0.6); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 12px; cursor: pointer; }
.img-add { width: 80px; height: 80px; border: 0.5px dashed var(--border2); border-radius: var(--r-md); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; cursor: pointer; flex-shrink: 0; color: var(--txt3); font-size: 11px; background: var(--bg2); }

/* ── Form Fields ── */
.field-grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 8px; margin-bottom: 10px; }
.field { display: flex; flex-direction: column; gap: 3px; }
.field.full { grid-column: 1/-1; }
.field label { font-size: 11px; color: var(--txt2); }
.field input, .field select, .field textarea {
  width: 100%; padding: 8px 10px;
  border: 0.5px solid var(--border2);
  border-radius: var(--r-md);
  font-size: 13px;
  background: var(--bg);
  color: var(--txt);
  font-family: inherit;
}
.field textarea { resize: vertical; min-height: 60px; }
.margin-preview { font-size: 12px; color: var(--txt2); margin-bottom: 10px; padding: 8px 10px; background: var(--bg2); border-radius: var(--r-md); }
.save-btn { width: 100%; height: 44px; background: var(--txt); color: var(--bg); border: none; border-radius: var(--r-md); font-size: 15px; font-weight: 600; cursor: pointer; }
.save-btn:active { opacity: 0.85; }
.saving-indicator { text-align: center; font-size: 12px; color: var(--txt3); margin-top: 8px; min-height: 18px; }

/* ── Toast ── */
.toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: var(--txt); color: var(--bg); padding: 8px 18px; border-radius: 20px; font-size: 13px; opacity: 0; transition: opacity 0.25s; pointer-events: none; white-space: nowrap; z-index: 999; }
.toast.show { opacity: 1; }

input[type=file] { display: none; }
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <h1>庫存管理</h1>
    <div class="sync-status">
      <div class="sync-dot" id="sync-dot"></div>
      <span id="sync-text">未連線</span>
    </div>
    <button class="icon-btn" onclick="syncNow()" title="立即同步" aria-label="同步"><i class="ti ti-refresh"></i></button>
  </div>

  <div id="setup-banner">
    <h3><i class="ti ti-settings"></i> 首次設定：連接 Google Sheets</h3>
    <p>請先完成 Apps Script 部署，再將 Web App URL 貼入下方。設定後資料將自動同步。</p>
    <input type="text" id="api-url" placeholder="https://script.google.com/macros/s/.../exec" value="">
    <button onclick="saveApiUrl()"><i class="ti ti-check"></i> 儲存並連線</button>
  </div>

  <div class="stats-row">
    <div class="stat"><div class="stat-label">總品項</div><div class="stat-val" id="s-total">—</div></div>
    <div class="stat"><div class="stat-label">低庫存</div><div class="stat-val warn" id="s-low">—</div></div>
    <div class="stat"><div class="stat-label">缺貨</div><div class="stat-val warn" id="s-zero">—</div></div>
  </div>

  <div class="search-wrap">
    <i class="ti ti-search"></i>
    <input type="text" id="q" placeholder="搜尋名稱、SKU、供應商..." oninput="render()">
  </div>
  <div class="tabs" id="tabs"></div>
  <div class="filter-row">
    <select id="sort" onchange="render()">
      <option value="order">自訂排序</option>
      <option value="name">名稱 A→Z</option>
      <option value="stock-asc">庫存 少→多</option>
      <option value="stock-desc">庫存 多→少</option>
      <option value="price-desc">售價 高→低</option>
    </select>
    <div class="badge-low" id="low-btn" onclick="toggleLow()">⚠ 只看低庫存</div>
  </div>

  <div class="grid" id="grid"></div>
</div>

<button class="fab" onclick="openNew()" aria-label="新增產品"><i class="ti ti-plus"></i></button>

<!-- Product Modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-head">
      <h2 id="modal-title">產品詳細</h2>
      <button class="icon-btn danger" onclick="deleteProduct()" aria-label="刪除"><i class="ti ti-trash"></i></button>
      <button class="icon-btn" onclick="closeModal()" aria-label="關閉"><i class="ti ti-x"></i></button>
    </div>

    <div class="img-gallery" id="img-gallery"></div>
    <input type="file" id="img-input" accept="image/*" multiple onchange="handleImgs(event)">

    <div class="field-grid">
      <div class="field full"><label>產品名稱 *</label><input id="f-name" type="text" placeholder="必填"></div>
      <div class="field">
        <label>分類</label>
        <select id="f-cat">
          <option>手鍊</option><option>吊飾項鍊</option><option>雕件擺件</option>
        </select>
      </div>
      <div class="field"><label>SKU 編號</label><input id="f-sku" type="text" placeholder="留空自動生成"></div>
      <div class="field"><label>售價 (NT$)</label><input id="f-price" type="number" min="0" oninput="updateMargin()"></div>
      <div class="field"><label>成本 (NT$)</label><input id="f-cost" type="number" min="0" oninput="updateMargin()"></div>
      <div class="field"><label>庫存數量</label><input id="f-stock" type="number" min="0"></div>
      <div class="field"><label>低庫存警戒線</label><input id="f-alert" type="number" min="0" value="5"></div>
      <div class="field"><label>供應商</label><input id="f-supplier" type="text"></div>
      <div class="field full"><label>規格 / 尺寸</label><input id="f-spec" type="text" placeholder="例：10mm、長20cm"></div>
      <div class="field full"><label>備註</label><textarea id="f-note"></textarea></div>
    </div>

    <div class="margin-preview" id="margin-preview">輸入售價與成本後自動計算毛利</div>
    <button class="save-btn" onclick="saveProduct()">儲存並同步</button>
    <div class="saving-indicator" id="saving-indicator"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ================================================================
// 狀態
// ================================================================
let products   = [];
let activeCat  = '全部';
let lowOnly    = false;
let editingId  = null;
let pendingImgs = [];
let skuSeq     = 1000;
let apiUrl     = localStorage.getItem('inv_api_url') || '';
let isSyncing  = false;

const CATS = ['手鍊', '吊飾項鍊', '雕件擺件'];

// ================================================================
// 工具
// ================================================================
function uid(){ return 'p' + Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function genSKU(cat){
  const pre = { '手鍊':'BRC', '吊飾項鍊':'PND', '雕件擺件':'STA' };
  return (pre[cat]||'SKU') + '-' + (++skuSeq);
}
function toast(msg, dur=1800){
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), dur);
}
function setSyncStatus(state){
  const dot  = document.getElementById('sync-dot');
  const text = document.getElementById('sync-text');
  dot.className = 'sync-dot' + (state==='syncing'?' syncing':state==='error'?' error':'');
  text.textContent = state==='ok'?'已同步':state==='syncing'?'同步中...':state==='error'?'同步失敗':'未連線';
}
function persist(){ try{ localStorage.setItem('inv_local', JSON.stringify(products)); }catch(e){} }
function loadLocal(){
  try{
    const s = localStorage.getItem('inv_local');
    if(s){ products = JSON.parse(s); return true; }
  }catch(e){}
  return false;
}

// ================================================================
// API 連線設定
// ================================================================
function saveApiUrl(){
  const url = document.getElementById('api-url').value.trim();
  if(!url){ alert('請貼上 Web App URL'); return; }
  apiUrl = url;
  localStorage.setItem('inv_api_url', url);
  document.getElementById('setup-banner').style.display = 'none';
  syncNow();
}

async function callApi(action, body={}){
  if(!apiUrl) throw new Error('未設定 API URL');
  const payload = encodeURIComponent(JSON.stringify(body));
  const url = apiUrl + '?action=' + action + '&payload=' + payload;
  const res = await fetch(url, { method: 'GET', redirect: 'follow' });
  return res.json();
}

// ================================================================
// 同步：從 Sheets 拉資料
// ================================================================
async function syncNow(){
  if(!apiUrl){ setSyncStatus('offline'); return; }
  if(isSyncing) return;
  isSyncing = true;
  setSyncStatus('syncing');
  try {
    const data = await callApi('getAll');
    if(data.error) throw new Error(data.error);
    products = data.products || [];
    persist();
    setSyncStatus('ok');
    render();
    toast('已從 Google Sheets 同步');
  } catch(e){
    setSyncStatus('error');
    toast('同步失敗：' + e.message, 3000);
  } finally {
    isSyncing = false;
  }
}

// ================================================================
// 推送單一產品到 Sheets
// ================================================================
async function pushProduct(p){
  if(!apiUrl) return;
  setSyncStatus('syncing');
  try {
    await callApi('upsert', { product: p });
    setSyncStatus('ok');
  } catch(e){
    setSyncStatus('error');
    toast('推送失敗，資料已存本地', 2500);
  }
}

async function pushDelete(id){
  if(!apiUrl) return;
  try { await callApi('delete', { id }); } catch(e){}
}

async function pushReorder(ids){
  if(!apiUrl) return;
  try { await callApi('reorder', { ids }); } catch(e){}
}

// ================================================================
// 圖片上傳到 Google Drive
// ================================================================
async function uploadImgToDrive(base64, mimeType, filename){
  if(!apiUrl) return null;
  try {
    const res = await callApi('uploadImg', { base64, mimeType, filename });
    return res.url || null;
  } catch(e){ return null; }
}

// ================================================================
// 初始化
// ================================================================
function initData(){
  if(apiUrl) document.getElementById('setup-banner').style.display = 'none';
  document.getElementById('api-url').value = apiUrl;

  if(loadLocal() && products.length){ render(); }

  if(apiUrl) syncNow();
  else setSyncStatus('offline');

  // 每 60 秒自動同步
  setInterval(()=>{ if(apiUrl && !isSyncing) syncNow(); }, 60000);
}

// ================================================================
// 渲染
// ================================================================
function filtered(){
  const q = document.getElementById('q').value.trim().toLowerCase();
  const sort = document.getElementById('sort').value;
  let list = products.filter(p => {
    if(activeCat !== '全部' && p.cat !== activeCat) return false;
    if(lowOnly && p.stock > p.alert) return false;
    if(q && !p.name.toLowerCase().includes(q) && !p.sku.toLowerCase().includes(q) && !(p.supplier||'').toLowerCase().includes(q)) return false;
    return true;
  });
  if(sort==='name')       list.sort((a,b)=>a.name.localeCompare(b.name,'zh-TW'));
  else if(sort==='stock-asc')  list.sort((a,b)=>a.stock-b.stock);
  else if(sort==='stock-desc') list.sort((a,b)=>b.stock-a.stock);
  else if(sort==='price-desc') list.sort((a,b)=>b.price-a.price);
  else list.sort((a,b)=>(a.order||0)-(b.order||0));
  return list;
}

function renderTabs(){
  document.getElementById('tabs').innerHTML = ['全部',...CATS].map(c => {
    const cnt = c==='全部' ? products.length : products.filter(p=>p.cat===c).length;
    return `<div class="tab${activeCat===c?' active':''}" onclick="setTab('${c}')">${c} <span style="opacity:0.5">${cnt}</span></div>`;
  }).join('');
}

function updateStats(){
  document.getElementById('s-total').textContent = products.length;
  document.getElementById('s-low').textContent = products.filter(p=>p.stock<=p.alert&&p.stock>0).length;
  document.getElementById('s-zero').textContent = products.filter(p=>p.stock===0).length;
}

function renderGrid(){
  const list = filtered();
  const g = document.getElementById('grid');
  if(!list.length){
    g.innerHTML = '<div class="empty"><i class="ti ti-mood-empty" style="font-size:36px;display:block;margin-bottom:8px"></i>找不到產品</div>';
    return;
  }
  g.innerHTML = list.map(p => {
    const warn   = p.stock <= p.alert;
    const zero   = p.stock === 0;
    const margin = p.price > 0 ? Math.round((p.price - p.cost) / p.price * 100) : 0;
    const imgHtml = p.imgs && p.imgs.length
      ? `<img src="${p.imgs[0]}" alt="${p.name}" loading="lazy">${p.imgs.length>1?`<div class="img-count">+${p.imgs.length-1}</div>`:''}`
      : `<i class="ti ti-photo no-img"></i>`;
    return `<div class="pcard${warn&&!zero?' low-warn':''}${zero?' zero-warn':''}"
      draggable="true"
      data-id="${p.id}"
      ondragstart="dragStart(event,'${p.id}')"
      ondragover="dragOver(event)"
      ondrop="drop(event,'${p.id}')"
      ondragend="dragEnd(event)"
      ondragleave="dragLeave(event)">
      <div class="pimg" onclick="openEdit('${p.id}')">${imgHtml}</div>
      <div class="pinfo">
        <div class="pname" onclick="openEdit('${p.id}')">${p.name}</div>
        <div class="pmeta">${p.sku} · ${margin}%毛利</div>
        <div class="pstock-row">
          <span class="pstock${warn?' warn':''}${zero?' zero':''}">${p.stock}</span>
          <div class="stock-btns">
            <button class="sbtn" onclick="adj('${p.id}',-1,event)" aria-label="減少">−</button>
            <button class="sbtn" onclick="adj('${p.id}',1,event)" aria-label="增加">+</button>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function render(){ renderTabs(); updateStats(); renderGrid(); }
function setTab(c){ activeCat=c; render(); }
function toggleLow(){ lowOnly=!lowOnly; document.getElementById('low-btn').classList.toggle('on',lowOnly); render(); }

// ================================================================
// 庫存快速調整
// ================================================================
function adj(id, delta, event){
  event.stopPropagation();
  const p = products.find(x=>x.id===id);
  if(!p) return;
  p.stock = Math.max(0, p.stock + delta);
  persist(); render();
  clearTimeout(window._adjTimer);
  window._adjTimer = setTimeout(()=>pushProduct(p), 1200);
}

// ================================================================
// 拖拉排序
// ================================================================
let dragSrcId = null;
function dragStart(e,id){ dragSrcId=id; e.currentTarget.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; }
function dragOver(e){ e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
function dragLeave(e){ e.currentTarget.classList.remove('drag-over'); }
function dragEnd(e){ e.currentTarget.classList.remove('dragging'); document.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over')); }
function drop(e, toId){
  e.preventDefault(); e.currentTarget.classList.remove('drag-over');
  if(!dragSrcId || dragSrcId===toId) return;
  const src = products.find(p=>p.id===dragSrcId);
  const tgt = products.find(p=>p.id===toId);
  if(!src||!tgt) return;
  const tmp = src.order; src.order = tgt.order; tgt.order = tmp;
  persist(); render();
  clearTimeout(window._reorderTimer);
  window._reorderTimer = setTimeout(()=>{
    const ids = [...products].sort((a,b)=>a.order-b.order).map(p=>p.id);
    pushReorder(ids);
  }, 1500);
}

// ================================================================
// Modal：開啟新增 / 編輯
// ================================================================
function openNew(){
  editingId = null;
  document.getElementById('modal-title').textContent = '新增產品';
  document.getElementById('f-name').value = '';
  document.getElementById('f-cat').value = '手鍊';
  document.getElementById('f-sku').value = '';
  document.getElementById('f-price').value = '';
  document.getElementById('f-cost').value = '';
  document.getElementById('f-stock').value = '0';
  document.getElementById('f-alert').value = '5';
  document.getElementById('f-supplier').value = '';
  document.getElementById('f-spec').value = '';
  document.getElementById('f-note').value = '';
  pendingImgs = [];
  renderGallery();
  updateMargin();
  document.getElementById('overlay').classList.add('open');
  document.getElementById('saving-indicator').textContent = '';
}

function openEdit(id){
  const p = products.find(x=>x.id===id);
  if(!p) return;
  editingId = id;
  document.getElementById('modal-title').textContent = '編輯產品';
  document.getElementById('f-name').value     = p.name;
  document.getElementById('f-cat').value      = p.cat;
  document.getElementById('f-sku').value      = p.sku;
  document.getElementById('f-price').value    = p.price;
  document.getElementById('f-cost').value     = p.cost;
  document.getElementById('f-stock').value    = p.stock;
  document.getElementById('f-alert').value    = p.alert;
  document.getElementById('f-supplier').value = p.supplier || '';
  document.getElementById('f-spec').value     = p.spec     || '';
  document.getElementById('f-note').value     = p.note     || '';
  pendingImgs = [...(p.imgs || [])];
  renderGallery();
  updateMargin();
  document.getElementById('overlay').classList.add('open');
  document.getElementById('saving-indicator').textContent = '';
}

function closeModal(){ document.getElementById('overlay').classList.remove('open'); editingId=null; }
document.getElementById('overlay').addEventListener('click', e=>{ if(e.target===e.currentTarget) closeModal(); });

function updateMargin(){
  const pr = +document.getElementById('f-price').value||0;
  const co = +document.getElementById('f-cost').value||0;
  const m  = pr > 0 ? Math.round((pr-co)/pr*100) : 0;
  document.getElementById('margin-preview').textContent = pr
    ? `售價 NT$${pr.toLocaleString()} · 成本 NT$${co.toLocaleString()} · 毛利 ${m}%`
    : '輸入售價與成本後自動計算毛利';
}

// ================================================================
// 圖片處理
// ================================================================
function renderGallery(){
  document.getElementById('img-gallery').innerHTML =
    pendingImgs.map((src,i) => `
      <div class="img-thumb">
        <img src="${src}" alt="圖${i+1}">
        <div class="del-img" onclick="removeImg(${i})"><i class="ti ti-x"></i></div>
      </div>`).join('') +
    `<div class="img-add" onclick="document.getElementById('img-input').click()">
      <i class="ti ti-plus" style="font-size:20px"></i>
      <span>上傳圖片</span>
    </div>`;
}

function removeImg(i){ pendingImgs.splice(i,1); renderGallery(); }

async function handleImgs(e){
  const files = [...e.target.files];
  document.getElementById('saving-indicator').textContent = '圖片處理中...';
  let done = 0;
  for(const file of files){
    const base64 = await cropToSquare(file);
    let url = base64;
    if(apiUrl){
      const driveUrl = await uploadImgToDrive(base64, file.type, file.name);
      if(driveUrl) url = driveUrl;
    }
    pendingImgs.push(url);
    done++;
  }
  renderGallery();
  document.getElementById('saving-indicator').textContent = done > 0 ? `${done} 張圖片已處理` : '';
  e.target.value = '';
}

function cropToSquare(file){
  return new Promise(resolve=>{
    const reader = new FileReader();
    reader.onload = ev=>{
      const img = new Image();
      img.onload = ()=>{
        const size = Math.min(img.width, img.height);
        const canvas = document.createElement('canvas');
        canvas.width = canvas.height = 600;
        const ctx = canvas.getContext('2d');
        const sx = (img.width-size)/2, sy = (img.height-size)/2;
        ctx.drawImage(img, sx, sy, size, size, 0, 0, 600, 600);
        resolve(canvas.toDataURL('image/jpeg', 0.85));
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// ================================================================
// 儲存產品
// ================================================================
async function saveProduct(){
  const name = document.getElementById('f-name').value.trim();
  if(!name){ alert('請填入產品名稱'); return; }

  const cat      = document.getElementById('f-cat').value;
  const sku      = document.getElementById('f-sku').value.trim() || genSKU(cat);
  const indicator = document.getElementById('saving-indicator');
  indicator.textContent = '儲存中...';

  const p = {
    id:       editingId || uid(),
    name, cat, sku,
    price:    +document.getElementById('f-price').value    || 0,
    cost:     +document.getElementById('f-cost').value     || 0,
    stock:    +document.getElementById('f-stock').value    || 0,
    alert:    +document.getElementById('f-alert').value    || 5,
    supplier: document.getElementById('f-supplier').value.trim(),
    spec:     document.getElementById('f-spec').value.trim(),
    note:     document.getElementById('f-note').value.trim(),
    imgs:     pendingImgs,
    order:    editingId ? (products.find(x=>x.id===editingId)||{}).order||0 : products.length
  };

  if(editingId){
    const idx = products.findIndex(x=>x.id===editingId);
    if(idx>=0) products[idx] = p;
  } else {
    products.push(p);
  }

  persist(); render();

  await pushProduct(p);
  indicator.textContent = '✓ 已同步到 Google Sheets';
  setTimeout(()=>{ indicator.textContent=''; closeModal(); }, 1000);
}

// ================================================================
// 刪除產品
// ================================================================
async function deleteProduct(){
  if(!editingId) return;
  if(!confirm('確定刪除此產品？此操作也會從 Google Sheets 中移除。')) return;
  const id = editingId;
  products = products.filter(p=>p.id!==id);
  persist(); render(); closeModal();
  await pushDelete(id);
  toast('產品已刪除');
}

// ================================================================
// 啟動
// ================================================================
initData();
